    Experience:
      - company: Pudu Robotics
        position: VLA Algorithm Intern
        location: Shenzhen, China
        start_date: 2026-03
        end_date: 2026-06
        summary: Worked on vision-language-action foundation models for a self-developed wheeled dual-arm robot, covering reproduction & adaptation, evaluation, inference acceleration, and reinforcement-learning post-training.
        highlights:
          - "Model reproduction & embodiment adaptation: reproduced GR00T-N1 and DM0, performed SFT on box-moving and production-task data for a self-developed wheeled dual-arm body, adapted action representation and inference config, and documented training pitfalls with effect attribution."
          - "RoboChallenge evaluation for in-house foundation model: built the official RoboChallenge eval pipeline, deployed an HTTP inference service + ClientAPI, local mock closed-loop, and a 20-dim model-action to Franka control-interface action mapping; fine-tuned on Table 30 tasks."
          - "Inference acceleration: following Realtime-VLA, optimized end-to-end online inference with CUDA Graph to remove CPU scheduling overhead, client-side pre-resize, image codec WebP95→JPEG90, and WebSocket→ZMQ communication, cutting per-step latency by ~50ms."
          - "RL post-training: applied ConRFT reinforcement-learning fine-tuning on FlowerVLA SFT weights; designed a human-in-the-loop (SFT→offline RL→online RL) pipeline combining BC and Q-learning dual loss, human intervention and sparse rewards, built a reward model and real-robot rollout eval loop, substantially improving grasp/push success and error recovery."

      - company: Anker Innovations
        position: Embodied Closed-Loop Algorithm Intern
        location: Shenzhen, China
        start_date: 2025-10
        end_date: 2026-03
        summary: Developed VLA model deployment, multimodal robot-data pipelines, teleoperation data collection, and VLM auto-labeling toolchains for quadruped and manipulator platforms.
        highlights:
          - "VLA reproduction & validation: reproduced ACT, pi0.5, and Diffusion Policy, completed end-to-end Franka block-insertion validation; deployed InternVLA-N1 in a client/server split on Unitree Go2 — RTX 4090 ran an HTTP inference server while Jetson Orin ran D435i capture + ROS2/UDP control bridge, streaming trajectories over LAN HTTP for language-guided navigation."
          - "Quadruped multimodal data pipeline: built an 8-sensor spatiotemporal alignment chain — 3-LiDAR extrinsic calibration, coordinate transforms and point-cloud fusion, plus 5 fisheye-camera calibration & undistortion; deployed MCAP slicing/unpacking/alignment services on Kubernetes with task-queue async scheduling, processing tens of TB of raw robot data."
          - "Manipulator data collection: built UMI + teleop collection pipelines covering LAN networking, NTP clock sync, station ingest, rerun playback, multimodal alignment, and WebDataset/lerobot format conversion; surveyed data-quality eval literature and industry methods, then designed a 5-dimension on-device quality rule check plus a cloud data-lake scoring algorithm."
          - "VLM auto-labeling & toolchain: built a Qwen-VL + GroundingDINO video-understanding data-production line for scene description, object grounding and region annotation; via vLLM high-concurrency inference, multi-machine parallelism and queue load balancing, lifted end-to-end throughput by ~30%."

      - company: Westlake University, CenBRAIN Lab
        position: Algorithm Engineer Intern
        location: Hangzhou, China
        start_date: 2025-06
        end_date: 2025-09
        summary: Worked on invasive brain-computer interface (iBCI) speech decoding, building sEEG data pipelines and an acoustic-inspired hierarchical Chinese decoding architecture.
        highlights:
          - "Built the clinical sEEG data acquisition & preprocessing pipeline: low-pass filtering, power-line notch, down-sampling, channel selection and differential referencing; used MFA, pyPinyin and IPA mapping to generate word-level time boundaries and initial/tone/final labels."
          - "Designed an acoustic-inspired hierarchical decoding architecture: a shared 1D-CNN/RNN temporal backbone encodes C×T sEEG segments, with three parallel Initial/Tone/Final decoders; recovered sentence-level Chinese output via Beam Search, pinyin-to-char mapping and LLM re-ranking."

    Projects:
      - name: Crude-Oil Market Data & Intelligent Investment-Research Platform
        summary: A backend data and AI quant-strategy platform for Ningbo Bohui Chemical, covering multi-asset market data, low-latency streaming, DAG-based strategy orchestration, and an offloaded compute architecture.
        highlights:
          - "AI quant strategy workbench: used Codex and Claude Code to design the workbench, built a strategy-factor Workflow with DAG visual orchestration, ingested real-time exchange quotes, and constructed a CTP→Kafka→ClickHouse low-latency streaming path."
          - "Multi-asset market & backtest data pipeline: integrated FMP, TradingView, PostgreSQL hot DB, OSS historical archive and real-time indicator services across futures, US equities and A-shares; designed a main-site + Mac worker + OSS architecture that decoupled compute from the main pipeline."
        start_date: 2025-10
        end_date: 2026-04

